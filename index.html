  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GBY1G4B8K8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-GBY1G4B8K8');
  </script>
</head>
<body>
  <div id="map"></div>

        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        language: 'uk'

      var markers = L.markerClusterGroup({ maxClusterRadius: 25 });

      function createCustomIcon(type, color) {

          markerColor: color
        });

          name: "Мала Антонівка з Хатою", price: "$5,900", size: "0.31 га", distance: "74 км",

          link: "https://landhub.com.ua/plot/8-sotok-muzychi", visible: true },

        { type: 'plot', color: 'blue', coords: [50.177453, 29.923875],
          name: "Дорогинка", price: "$8,500", size: "0.26 га", distance: "55 км",
          link: "https://landhub.com.ua/plot/26-sotok-dorohynka", visible: true },

        { type: 'plot', color: 'blue', coords: [49.769642, 31.547382],
          name: "Келеберда", price: "$1,500", size: "0.10 га", distance: "120 км",
          link: "https://landhub.com.ua/plot/10-sotok-keleberda", visible: true },

        { type: 'plot', color: 'blue', coords: [50.026000, 29.754083],
          name: "Волиця", price: "$8,500", size: "0.25 га", distance: "80 км",

        { type: 'plot', color: 'blue', coords: [50.096787, 30.361381],
          name: "Барахти", price: "$6,900", size: "0.1592 га", distance: "35 км",
          link: "https://landhub.com.ua/plot/16-sotok-barakhty", visible: true },

        { type: 'plot', color: 'blue', coords: [50.750496, 29.836949],

          link: "https://landhub.com.ua/plot/23-sotok-myrcha-richka", visible: true },

        { type: 'house', color: 'green', coords: [50.135176, 29.952216],

          link: "https://landhub.com.ua/house/2", visible: false },

        { type: 'plot', color: 'blue', coords: [49.476711, 30.139640],

        { type: 'plot', color: 'blue', coords: [50.384115, 29.817281],

        { type: 'plot', color: 'blue', coords: [50.165526, 30.584006],
          name: "Старі Безрадичі", price: "$9,500", size: "0.829 га", distance: "7 км",
          link: "https://landhub.com.ua/plot/8-sotok-bezradychi", visible: true },

        { type: 'plot', color: 'blue', coords: [50.126429, 30.116860],
          name: "Оленівка", price: "$3,000", size: "0.12 га", distance: "45 км",
          link: "https://landhub.com.ua/plot/12-sotok-olenivka", visible: true },

        { type: 'plot', color: 'blue', coords: [50.845521, 30.311336],
          name: "Круги", price: "$7,500", size: "0.25 га", distance: "45 км",
          link: "https://landhub.com.ua/plot/25-sotok-lis-kruhy-vyshhorodskyi", visible: true },

          name: "Велика Офірна 9", price: "$3,000", size: "0.09 га", distance: "70 км",
          link: "https://landhub.com.ua/plot/velyka-ofirna-sosnovy-lis", visible: true },

        { type: 'plot', color: 'blue', coords: [50.105908, 30.636186],
          name: "Обухів", price: "$7,500", size: "0.06 га", distance: "30 км",
          link: "https://landhub.com.ua/plot/obukhiv-panorama-skhyl", visible: true },

        // ====== ШАБЛОНИ ДЛЯ НОВИХ ДІЛЯНОК ======
        // Щоб активувати: змінити visible: false → true, і заповнити coords, name, price, size, distance, link
        // link формат: https://landhub.com.ua/plot/[slug-ділянки]

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 1", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 2", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 3", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 4", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 5", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 6", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 7", price: "$0", size: "0.00 ага", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 8", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 9", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

        { type: 'plot', color: 'blue', coords: [50.4501, 30.5234],
          name: "НОВИЙ ОБ'ЄКТ 10", price: "$0", size: "0.00 га", distance: "0 км",
          link: "https://landhub.com.ua/", visible: false },

      ];

      plots.forEach(plot => {
        if (!plot.hasOwnProperty("visible") || plot.visible) {
          let marker = L.marker(plot.coords, {
            icon: createCustomIcon(plot.type, plot.color)
          });

          marker.bindPopup(
            '<b>' + plot.name + '</b><br>' +
            'Ціна: ' + plot.price + '<br>' +
            'Площа: ' + plot.size + '<br>' +
            'Відстань до Києва: ' + plot.distance + '<br>' +
            '<a href="' + plot.link + '" target="_blank" rel="noopener noreferrer">Докладніше</a>'
          );

          marker.on('click', function() {
            if (typeof gtag === 'function') {
              gtag('event', 'select_plot', { 'plot_id': plot.name });
            }
          });

          markers.addLayer(marker);
        }
      });

      map.addLayer(markers);

      const KYIV = L.latLng(50.4501, 30.5234);

      function fitAllIncludingKyiv() {
        let b = markers.getBounds ? markers.getBounds() : L.latLngBounds();
        let all = L.latLngBounds(b);
        all.extend(KYIV);
        if (all.isValid()) {
          map.fitBounds(all, { padding: [40, 40], maxZoom: 11, animate: false });
        } else {
          map.setView(KYIV, 10);
        }
      }

      setTimeout(fitAllIncludingKyiv, 0);
      map.on('resize', fitAllIncludingKyiv);
    });
  </script>
</body>
</html>
